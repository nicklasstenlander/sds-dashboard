name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Kör varje kvart för att hålla Shopify-data färsk
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm ci

      - name: Fetch Shopify data
        env:
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_SECRET: ${{ secrets.SHOPIFY_SECRET }}
          SHOPIFY_SHOP: ${{ secrets.SHOPIFY_SHOP }}
        run: node scripts/fetch-shopify.js

      - run: npm run build
        env:
          VITE_BASE_URL: ${{ steps.pages.outputs.base_path }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
