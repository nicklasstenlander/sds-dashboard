<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SODSS Skyltning</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #player {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    /* ── Slides ── */
    .slide {
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      opacity: 0;
      pointer-events: none;
    }
    .slide img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }
    .slide video {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }

    /* ── Progress bar ── */
    #progress {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      width: 0%;
      background: #dd5c86;
      opacity: 0.75;
      z-index: 50;
      transition: width linear;
    }

    /* ── Loader ── */
    #loader {
      position: fixed;
      top: 0; right: 0; bottom: 0; left: 0;
      background: #1e4025;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 100;
      transition: opacity 0.6s ease;
    }
    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loader .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid rgba(205,220,209,0.3);
      border-top-color: #CDDCD1;
      border-radius: 50%;
      animation: spin 1.1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader p {
      color: #CDDCD1;
      font-size: 13px;
      font-family: monospace;
      letter-spacing: 0.1em;
    }
    #loader .logo {
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(205,220,209,0.4);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ── Error ── */
    #error {
      position: fixed;
      top: 0; right: 0; bottom: 0; left: 0;
      background: #1e4025;
      color: #CDDCD1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      font-family: monospace;
      text-align: center;
      padding: 48px;
    }
    #error.visible { display: flex; }
    #error .icon { font-size: 40px; }
    #error strong { font-size: 16px; }
    #error span { font-size: 13px; opacity: 0.6; }
    #error small { font-size: 11px; opacity: 0.35; margin-top: 8px; }

    /* ── Clock (valfritt) ── */
    #clock {
      position: fixed;
      bottom: 20px;
      right: 24px;
      color: rgba(255,255,255,0.25);
      font-family: monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      z-index: 40;
    }

    /* ── Slide counter (valfritt) ── */
    #counter {
      position: fixed;
      bottom: 20px;
      left: 24px;
      color: rgba(255,255,255,0.2);
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      z-index: 40;
    }
  </style>
</head>
<body>

<div id="loader">
  <div class="logo">SODSS · Skyltning</div>
  <div class="spinner"></div>
  <p id="loader-msg">Hämtar spellista…</p>
</div>

<div id="error">
  <div class="icon">⚠</div>
  <strong>Kunde inte ladda spellista</strong>
  <span id="error-msg"></span>
  <small id="error-detail"></small>
</div>

<div id="player"></div>
<div id="progress"></div>
<div id="clock"></div>
<div id="counter"></div>

<script>
// ─── URL-parametrar ──────────────────────────────────────────────────────────
//
//  Obligatoriska:
//    ?worker=https://sodss-signage.xxx.workers.dev
//
//  Valfria:
//    &screen=reception       (för framtida per-skärm-spellistor)
//    &reload=30              (minuter mellan omhämtning av spellista, default 30)
//    &clock=1                (visa klocka nere till höger)
//    &counter=1              (visa bildräknare nere till vänster)
//    &transition=0.7         (fade-tid i sekunder)

var p          = new URLSearchParams(location.search);
var WORKER_URL = p.get('worker') || (location.protocol + '//' + location.host);
var SCREEN_ID  = p.get('screen') || 'default';
var RELOAD_MIN = parseInt(p.get('reload') || '30');
var SHOW_CLOCK = p.get('clock') === '1';
var SHOW_COUNT = p.get('counter') === '1';

// ─── DOM ─────────────────────────────────────────────────────────────────────
var playerEl  = document.getElementById('player');
var loaderEl  = document.getElementById('loader');
var loaderMsg = document.getElementById('loader-msg');
var errorEl   = document.getElementById('error');
var errorMsg  = document.getElementById('error-msg');
var errorDet  = document.getElementById('error-detail');
var progressEl= document.getElementById('progress');
var clockEl   = document.getElementById('clock');
var counterEl = document.getElementById('counter');

// ─── State ───────────────────────────────────────────────────────────────────
var playlist = [];
var current  = -1;
var advTimer = null;

// ─── UI helpers ───────────────────────────────────────────────────────────────
function showError(msg, detail) {
  loaderEl.style.opacity = '0';
  loaderEl.style.pointerEvents = 'none';
  errorEl.style.display = 'flex';
  errorMsg.innerHTML = msg;
  errorDet.innerHTML = detail || '';
}

function hideLoader() {
  loaderEl.style.opacity = '0';
  loaderEl.style.pointerEvents = 'none';
}

// ─── Clock ───────────────────────────────────────────────────────────────────
clockEl.style.display = SHOW_CLOCK ? 'block' : 'none';
counterEl.style.display = SHOW_COUNT ? 'block' : 'none';

function updateClock() {
  if (!SHOW_CLOCK) return;
  clockEl.textContent = new Date().toLocaleTimeString('sv-SE', {
    hour: '2-digit', minute: '2-digit'
  });
}
setInterval(updateClock, 15000);
updateClock();

// ─── Fetch spellista från Worker ─────────────────────────────────────────────
function fetchPlaylist() {
  loaderMsg.textContent = 'Hämtar spellista…';
  return fetch(WORKER_URL + '/api/files')
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data) {
      var files = (data.files || []).filter(function(f) {
        return f.type === 'image' || f.type === 'video';
      });

      if (files.length === 0) {
        showError('Inga filer', 'Worker svarade men returnerade tom lista');
        return false;
      }

      playlist = files.map(function(f) {
        return {
          key:      f.key,
          name:     f.name,
          type:     f.type,
          url:      f.url,
          duration: f.duration || 8,
        };
      });

      return true;
    })
    .catch(function(err) {
      showError('Fetch-fel: ' + err.message + ' | URL: ' + WORKER_URL);
      return false;
    });
}

// ─── Bygg slide-DOM ───────────────────────────────────────────────────────────
function buildSlides() {
  playerEl.innerHTML = '';

  for (var i = 0; i < playlist.length; i++) {
    var item = playlist[i];
    var slide = document.createElement('div');
    slide.className = 'slide';
    slide.setAttribute('data-index', i);

    if (item.type === 'image') {
      var img = new Image();
      img.src = item.url;
      img.alt = item.name;
      slide.appendChild(img);

    } else {
      var vid = document.createElement('video');
      vid.src      = item.url;
      vid.muted    = true;
      vid.autoplay = false;
      vid.preload  = 'auto';
      vid.loop     = false;

      vid.addEventListener('ended', function() {
        if (parseInt(slide.getAttribute('data-index')) === current) nextSlide();
      });
      vid.addEventListener('error', function() {
        if (parseInt(slide.getAttribute('data-index')) === current) nextSlide();
      });

      slide.appendChild(vid);
    }

    playerEl.appendChild(slide);
  }
}

// ─── Visa bild/video ─────────────────────────────────────────────────────────
function showSlide(idx) {
  clearTimeout(advTimer);

  // Stoppa alla videor och sätt rätt synlighet med for-loop
  var allSlides = playerEl.getElementsByClassName('slide');
  for (var si = 0; si < allSlides.length; si++) {
    var s = allSlides[si];
    var isActive = si === idx;
    s.style.opacity = isActive ? '1' : '0';
    s.style.pointerEvents = isActive ? 'auto' : 'none';
    var svid = s.getElementsByTagName('video')[0];
    if (svid && !isActive) { svid.pause(); svid.currentTime = 0; }
  }

  if (SHOW_COUNT) {
    counterEl.innerHTML = (idx + 1) + ' / ' + playlist.length;
  }

  var item = playlist[idx];
  if (!item) return;

  progressEl.style.transition = 'none';
  progressEl.style.width = '0%';

  if (item.type === 'image') {
    var dur = (item.duration || 8) * 1000;
    requestAnimationFrame(function() {
      progressEl.style.transition = 'width ' + dur + 'ms linear';
      progressEl.style.width = '100%';
    });
    advTimer = setTimeout(nextSlide, dur);

  } else {
    var activeSlide = allSlides[idx];
    var vid = activeSlide ? activeSlide.getElementsByTagName('video')[0] : null;
    if (vid) {
      vid.currentTime = 0;
      var playPromise = vid.play();
      if (playPromise && playPromise.catch) {
        playPromise.catch(function() {
          advTimer = setTimeout(nextSlide, 60000);
        });
      }
      vid.addEventListener('loadedmetadata', function() {
        var dur = vid.duration * 1000;
        progressEl.style.transition = 'width ' + dur + 'ms linear';
        requestAnimationFrame(function() { progressEl.style.width = '100%'; });
        advTimer = setTimeout(nextSlide, dur + 3000);
      });
    }
  }
}

function nextSlide() {
  if (playlist.length === 0) return;
  current = (current + 1) % playlist.length;
  showSlide(current);
}

// ─── Starta ───────────────────────────────────────────────────────────────────
function init() {
  fetchPlaylist().then(function(ok) {
    if (!ok) return;
    buildSlides();
    hideLoader();
    current = 0;
    showSlide(0);
  });
}

// ─── Auto-reload spellista ────────────────────────────────────────────────────
// Hämtar om fillistan var N:e minut utan att avbryta pågående uppspelning
setInterval(function() {
  fetchPlaylist().then(function(ok) {
    if (ok) buildSlides(); // Slideshow fortsätter från current
  });
}, RELOAD_MIN * 60 * 1000);

// ─── Tangentbordsgenvägar (testläge) ─────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight') nextSlide();
  if (e.key === 'ArrowLeft') {
    current = (current - 2 + playlist.length) % playlist.length;
    nextSlide();
  }
  if (e.key === 'f' || e.key === 'F') {
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen();
    }
  }
});

// ─── Kör ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
